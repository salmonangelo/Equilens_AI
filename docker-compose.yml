version: '3.9'

services:
  equilens_ai:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - APP_ENV=production
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
